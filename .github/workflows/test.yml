name: CI — Lint, Test, Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 backend/ ai/ scraper/ notifications/ --max-line-length=120 --ignore=E501,W503

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vtu_scheduler_test
          POSTGRES_USER: vtu_user
          POSTGRES_PASSWORD: vtu_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run tests
        env:
          DATABASE_URL: postgresql://vtu_user:vtu_password@localhost:5432/vtu_scheduler_test
          APP_ENV: development
          GROQ_API_KEY: test_key
          PINECONE_API_KEY: test_key
          SECRET_KEY: test_secret_key_for_ci
        run: pytest tests/ -v --tb=short --ignore=tests/test_rag.py

  build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t vtu-backend:test .
      - name: Check image size
        run: |
          SIZE=$(docker image inspect vtu-backend:test --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ $SIZE_MB -gt 1500 ]; then
            echo "WARNING: Image exceeds 1.5GB"
          fi
