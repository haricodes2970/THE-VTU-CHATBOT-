version: "3.9"

networks:
  vtu-network:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: vtu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vtu_scheduler}
      POSTGRES_USER: ${POSTGRES_USER:-vtu_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vtu_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vtu_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vtu-network

  redis:
    image: redis:7-alpine
    container_name: vtu_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vtu-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vtu_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vtu-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vtu_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - vtu-network

volumes:
  postgres_data:
  redis_data:
